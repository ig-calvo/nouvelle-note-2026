<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Omnimed — Dossier patient</title>
<link rel="stylesheet" href="colors_and_type.css">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons|Material+Icons+Outlined" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f4f4f4; font-family: 'Inter', sans-serif; height: 100%; }
  * { box-sizing: border-box; }
  .app { display: flex; flex-direction: column; min-height: 100vh; background: #f4f4f4; }
  .main-row { display: flex; flex: 1; min-height: 0; }
  .content {
    flex: 1;
    padding: 14px 14px 24px 14px;
    display: flex;
    gap: 14px;
    min-width: 0;
    background: #f4f4f4;
  }
  .center-col { flex: 1; min-width: 0; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(166, 167, 229, 0.8); border-radius: 4px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="components/TopNav.jsx"></script>
<script type="text/babel" src="components/Sidebar.jsx"></script>
<script type="text/babel" src="components/PatientHeader.jsx"></script>
<script type="text/babel" src="components/ClinicalNoteCard.jsx"></script>
<script type="text/babel" src="components/ClinicalNoteList.jsx"></script>
<script type="text/babel" src="components/RecordSummary.jsx"></script>

<script type="text/babel">
const { useState } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "doctorName": "ignaci",
  "patientName": "guillaume tetreault"
}/*EDITMODE-END*/;

function App() {
  const [navActive, setNavActive] = useState("pending");
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  return (
    <div className="app">
      <TopNav user={tweaks.doctorName} />
      <div className="main-row">
        <Sidebar active={navActive} onSelect={setNavActive} patientName={tweaks.patientName} />
        <div className="content">
          <div className="center-col">
            <PatientHeader name={tweaks.patientName} />
            <ClinicalNoteCard />
            <ClinicalNoteList currentPhysician={tweaks.doctorName} patientName={tweaks.patientName} />
          </div>
          <RecordSummary />
        </div>
      </div>
      <TweaksPanel title="Tweaks">
        <TweakSection title="Médecin">
          <TweakText
            label="Nom du médecin"
            value={tweaks.doctorName}
            onChange={(v) => setTweak("doctorName", v)}
            placeholder="Prénom Nom"
          />
        </TweakSection>
        <TweakSection title="Patient">
          <TweakText
            label="Nom du patient"
            value={tweaks.patientName}
            onChange={(v) => setTweak("patientName", v)}
            placeholder="Prénom Nom"
          />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
